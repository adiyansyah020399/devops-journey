name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Tetap gunakan server GitHub untuk nge-build image
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build dan Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./claude/cicd-demo
          push: true
          tags: xowhacks/cicd-demo:latest

  deploy-to-server:
    runs-on: self-hosted # <--- INI KUNCINYA! Menginstruksikan job berjalan langsung di komputermu
    needs: build-and-push

    steps:
      - name: Deploy Container Secara Lokal
        run: |
          echo "Menarik image terbaru dari Docker Hub..."
          docker pull xowhacks/cicd-demo:latest
          
          echo "Menghentikan kontainer lama jika ada..."
          docker stop cicd-app-container || true
          docker rm cicd-app-container || true
          
          echo "Menjalankan kontainer baru..."
          docker run -d --name cicd-app-container -p 8080:80 xowhacks/cicd-demo:latest
          
          echo "Deployment Berhasil! Aplikasi berjalan di port 8080."
