<!DOCTYPE html>
<html>
<head>
    <title>DevOps Multi-Service</title>
    <style>
        body { background: #0d1117; color: #58a6ff;
               font-family: monospace; text-align: center; padding: 50px; }
        .service { border: 1px solid #30363d; border-radius: 8px;
                   padding: 20px; margin: 10px; display: inline-block; }
        .up { color: #3fb950; }
    </style>
</head>
<body>
    <h1>🚀 DevOps Multi-Service App</h1>
    <div class="service">
        <h2>Frontend</h2>
        <p class="up">✅ Nginx Running</p>
    </div>
    <div class="service">
        <h2>Backend</h2>
        <p class="up">✅ Python API Running</p>
    </div>
    <div class="service">
        <h2>Database</h2>
        <p class="up">✅ MySQL Running</p>
    </div>
</body>
</html>
